<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FALMERO PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
html{scroll-behavior:smooth;}

body{
margin:0;
font-family:'Poppins',sans-serif;
background:#fff;
opacity:0;
transition:0.5s;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
padding:15px 25px;
border-bottom:1px solid #eee;
align-items:center;
animation:fadeDown 0.6s ease;
}

.logo{
font-weight:600;
font-size:18px;
letter-spacing:1px;
}

/* CART BADGE */
.cart-wrapper{position:relative}
#cartCount{
position:absolute;
top:-5px;
right:-5px;
background:black;
color:white;
font-size:11px;
padding:3px 6px;
border-radius:50%;
}

/* HERO */
.hero{
height:70vh;
background:url('https://i.postimg.cc/cCtYzDgV/home.png') center/cover no-repeat;
display:flex;
align-items:center;
animation:fadeIn 1s ease;
}

.hero-content{
color:white;
padding:40px;
max-width:400px;
animation:fadeUp 1s ease;
}

/* PRODUCTS */
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:25px;
padding:30px;
}

.product{
text-align:center;
border:1px solid #eee;
padding:15px;
border-radius:15px;
transition:0.3s;
animation:fadeUp 0.6s ease;
}

.product:hover{
transform:translateY(-8px);
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.product img{
width:100%;
border-radius:10px;
}

/* BUTTONS */
button{
background:black;
color:white;
border:none;
padding:10px 16px;
border-radius:25px;
cursor:pointer;
font-size:14px;
transition:0.3s;
}

button:hover{
background:#222;
transform:scale(1.05);
}

header button:first-child{
background:none;
color:black;
}

/* CART */
.cart-page{
display:none;
padding:20px;
animation:fadeIn 0.5s ease;
}

.cart-item{
display:flex;
align-items:center;
gap:15px;
margin-bottom:15px;
border-bottom:1px solid #eee;
padding-bottom:10px;
animation:fadeUp 0.4s ease;
}

.cart-item img{
width:60px;
height:60px;
object-fit:cover;
border-radius:10px;
}

/* FOOTER */
.footer{
text-align:center;
padding:25px;
border-top:1px solid #eee;
}

.footer img{
width:25px;
margin:10px;
cursor:pointer;
transition:0.3s;
}

.footer img:hover{
transform:scale(1.2);
}

/* ANIMATIONS */
@keyframes fadeIn{
from{opacity:0}
to{opacity:1}
}

@keyframes fadeUp{
from{opacity:0;transform:translateY(20px)}
to{opacity:1;transform:translateY(0)}
}

@keyframes fadeDown{
from{opacity:0;transform:translateY(-20px)}
to{opacity:1;transform:translateY(0)}
}
</style>
</head>

<body>

<header>
<div class="logo">FALMERO</div>

<div style="display:flex;align-items:center;gap:10px;">
<button onclick="toggleSearch()">🔍</button>

<input id="searchInput" type="text" placeholder="Search"
onkeyup="searchProducts(this.value)" style="display:none;">

<div class="cart-wrapper">
<button onclick="showCart()">🛍️</button>
<span id="cartCount">0</span>
</div>
</div>
</header>

<div id="home">
<div class="hero">
<div class="hero-content">
<h1>FALMERO Essentials</h1>
<p>Simple never misses</p>
<button onclick="scrollToProducts()">Shop Now</button>
</div>
</div>

<div class="products" id="products"></div>
</div>

<div id="cart" class="cart-page">
<h2>FALMERO</h2>
<div id="cartItems"></div>
<div id="total"></div>
<button onclick="placeOrder()">Place Order</button>
</div>

<div class="footer">
<a href="https://www.instagram.com/falmero_official?igsh=MTI2eTRwMjNvZm1udA==" target="_blank"><img src="https://cdn-icons-png.flaticon.com/512/733/733558.png"></a>
<a href="https://vm.tiktok.com/ZS9LdqBTb7Dkj-V7d2C/" target="_blank"><img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png"></a>
<p>© 2026 FALMERO Clothing</p>
</div>

<script>

window.onload = () => { document.body.style.opacity = "1"; }

let products=[
{name:'Falmero Noir Edition Tee (Black)',price:379.99,img:'https://i.postimg.cc/m21mN2m4/IMG_20260409_WA0025.jpg', back:'https://i.postimg.cc/L6JbCV8S/IMG_20260409_WA0026.jpg'},
{name:'Falmero Blanc Edition Tee (White)',price:379.99,img:'https://i.postimg.cc/kMf0h4Ny/IMG_20260409_WA0027.jpg',back:'https://i.postimg.cc/L43942tk/IMG_20260409_WA0028.jpg' },
{name:'Midnight Prosperity Tee',price:00.00,img:'https://i.postimg.cc/G2gSkCF1/prosperity-tee-(black-front).png',back:'https://i.postimg.cc/FRHBdRJ8/prosperity-tee-(black-back.png'},
{name:'Ivory Standard Prosperity Tee',price:0.00,img:'https://i.postimg.cc/yxwQbypM/prosperity-tee-(back-and-white-front).png',back:'https://i.postimg.cc/6q7bcmcf/prosperity-tee-(back-and-white-back).png'},
{name:'Blue Legacy Proserity Tee',price:0.00,img:'https://i.postimg.cc/X7RmH4TF/prosperity-tee-(-blue-front)-Copy.png',back:'https://i.postimg.cc/DZwMJZbX/Prosperity-tee-(blue-back).png'},
{name:'Durban blue Prosperity Tee',price:0.00,img:'https://i.postimg.cc/nhknFmY1/Blue-Durban-Prosperity-Tee-(front).png',back:'https://i.postimg.cc/rwGvGLDN/Blue-Durban-prosperity-Tee-(back).png'}
];

let cart=[];
function renderProducts(list){
let container=document.getElementById('products');
container.innerHTML='';

list.forEach(p=>{
container.innerHTML+=`
<div class="product">
<img src="${p.img}" onclick="openModal('${p.name}',${p.price},'${p.img}','${p.back || p.img}')">
<h3>${p.name}</h3>
<p>R ${p.price.toFixed(2)}</p>

<select id="size-${p.name}">
<option>S</option>
<option selected>M</option>
<option>L</option>
<option>XL</option>
</select>

<button onclick="addToCart('${p.name}',${p.price},'${p.img}')">
Add to Cart
</button>
</div>`;
});
}

function toggleSearch(){
let input=document.getElementById('searchInput');
if(input.style.display==='none'){input.style.display='block';input.focus();}
else{input.style.display='none';input.value='';renderProducts(products);}
}

function searchProducts(text){
let filtered=products.filter(p=>p.name.toLowerCase().includes(text.toLowerCase()));
renderProducts(filtered);
}

function addToCart(name,price,img){
let size=document.getElementById(`size-${name}`).value;
let existing=cart.find(item=>item.name===name && item.size===size);

if(existing){existing.qty+=1;}
else{cart.push({name,price,img,size,qty:1});}

updateCartCount();
}

function updateCartCount(){
let count=cart.reduce((t,i)=>t+i.qty,0);
document.getElementById('cartCount').innerText=count;
}

function showCart(){
document.getElementById('home').style.display='none';
document.getElementById('cart').style.display='block';
renderCart();
}

function renderCart(){
let c=document.getElementById('cartItems');
c.innerHTML='';
let total=0;

cart.forEach((item,i)=>{
total+=item.price*item.qty;

c.innerHTML+=`
<div class="cart-item">
<img src="${item.img}">
<div>
<p>${item.name}</p>
<p>Size: ${item.size}</p>
<p>R ${item.price.toFixed(2)}</p>

<div>
<button onclick="changeQty(${i},-1)">-</button>
<span>${item.qty}</span>
<button onclick="changeQty(${i},1)">+</button>
</div>

<button onclick="removeItem(${i})" style="color:red;">Remove</button>
</div>
</div>`;
});

document.getElementById('total').innerText='Subtotal: R '+total.toFixed(2);
}

function changeQty(i,change){
cart[i].qty+=change;
if(cart[i].qty<=0){cart.splice(i,1);}
updateCartCount();
renderCart();
}

function removeItem(i){
cart.splice(i,1);
updateCartCount();
renderCart();
}

function placeOrder(){
let msg='FALMERO Order:%0A';
cart.forEach(i=>{
msg+=i.name+' Size:'+i.size+' x'+i.qty+' R '+i.price.toFixed(2)+'%0A';
});
window.open('https://wa.me/27728998043?text='+msg);
}

function scrollToProducts(){
document.getElementById('products').scrollIntoView({behavior:'smooth'});
}

renderProducts(products);

</script>


<!-- MODAL (ADDED ONLY) -->
<div id="productModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);justify-content:center;align-items:center;z-index:1000;">
<div style="background:#fff;padding:20px;border-radius:15px;max-width:400px;width:90%;text-align:center;position:relative;">
<button onclick="closeModal()" style="position:absolute;top:10px;right:10px;">✖</button>
<img id="modalImg" style="width:100%;border-radius:10px;">
<div style="margin:10px;">
<button onclick="prevImage()">⬅</button>
<button onclick="nextImage()">➡</button>
</div>
<h3 id="modalName"></h3>
<p id="modalPrice"></p>
<select id="modalSize">
<option>S</option>
<option selected>M</option>
<option>L</option>
<option>XL</option>
</select>
<br><br>
<button onclick="addToCartFromModal()">Add to Cart</button>
</div>
</div>

<script>
let currentImages=[],currentIndex=0,currentProduct={};

function openModal(name,price,img,back){
currentImages=[img,back];
currentIndex=0;
currentProduct={name,price,img};

document.getElementById('modalImg').src=img;
document.getElementById('modalName').innerText=name;
document.getElementById('modalPrice').innerText='R '+price.toFixed(2);

document.getElementById('productModal').style.display='flex';
}

function closeModal(){
document.getElementById('productModal').style.display='none';
}

function nextImage(){
currentIndex=(currentIndex+1)%currentImages.length;
document.getElementById('modalImg').src=currentImages[currentIndex];
}

function prevImage(){
currentIndex=(currentIndex-1+currentImages.length)%currentImages.length;
document.getElementById('modalImg').src=currentImages[currentIndex];
}

function addToCartFromModal(){
let size=document.getElementById('modalSize').value;
let existing=cart.find(i=>i.name===currentProduct.name && i.size===size);

if(existing){existing.qty+=1;}
else{cart.push({...currentProduct,size,qty:1});}

updateCartCount();
closeModal();
}
</script>

</body>
</html>
